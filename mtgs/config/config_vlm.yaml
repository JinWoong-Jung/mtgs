# ─────────────────────────────────────────────────────────────────────────────
# VLM Stage-2 (graph-token 주입 LoRA) 하이퍼파라미터
#   scripts/train_vlm.sh 의 token(학습)·eval(테스트) 모드가 이 파일을 읽는다.
#   데이터 경로만 런처에서 주고, 실험이름·배치·lr·scheduler·epoch 등은 전부 여기서.
#   다른 설정으로 돌리려면 이 파일을 복사해 CONFIG=경로 sbatch train_vlm.sh 로 지정.
# ─────────────────────────────────────────────────────────────────────────────

experiment:
  name: C_plain_nall         # 실험 이름 → 저장경로 <out_root>/<name>/, W&B run 이름
  out_root: experiments/vlm_plain  # 실험 저장 루트
  monitor: mean_social       # best 체크포인트 선택 지표 (클수록 좋음):
                             #   F1_LAH | F1_LAEO | AP_SA | mean_social(=셋 평균)

train:
  epochs: 3               # 전체 epoch 수
  bs: 8                   # per-step 배치 크기(샘플). GPU 메모리 여유 크면 12~16 권장
  accum: 1                # gradient accumulation 스텝 (유효배치 = bs * accum)
  steps_per_epoch: 20000  # epoch당 추출 샘플 수 (WeightedRandomSampler num_samples)
  num_workers: 6          # DataLoader 워커 수 (train + in-training val 공용)
  rank: 32                # LoRA rank (lora_alpha = 2*rank)
  seed: 101               # 재현성 시드 (MTGS와 통일)
  lora_targets:           # LoRA 학습 대상 projection (LM 한정). 원하는 것만 남겨 학습범위 조절
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

optim:
  lr: 1.0e-4              # 최대 학습률(peak LR)
  weight_decay: 0.01      # AdamW weight decay
  grad_clip: 1.0          # gradient clipping max-norm (<=0 이면 비활성)
  scheduler: cosine       # none | constant | linear | cosine
  warmup_ratio: 0.03      # 전체 opt 스텝 중 LR warmup 비율 (0 이면 warmup 없음)

val:
  vlm_bs: 48              # in-training val forward 배치 (매 epoch, no_grad)

eval:
  vlm_bs: 64              # test(standalone) forward 배치
  num_workers: 10         # test DataLoader 워커 수
