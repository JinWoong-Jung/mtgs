# Primary Qwen3-VL social-gaze configuration.
#
# This file describes one model only: a generative VLM with MTGS graph evidence
# written into the prompt. Graph-only controls and routing experiments belong in
# dedicated experiment configs, not in the production/default training surface.

experiment:
  name: VLM_v6(full)-routing(0.8)
  out_root: experiments/VLM
  monitor: mean_social_f1          # locked mean AP across LAH / LAEO / SA
  monitor_mode: max

data:
  # Profiles are built by scripts/build_vlm_cache.sh.
  # full: all rows; fast_frame: stride-3, unbalanced; balanced: ChildPlay/VAT, balanced;
  # balanced_full: all sources, stride-3, balanced.
  profile: full

routing:
  # use=false scores every pair with the VLM. use=true routes high-confidence
  # pairs to the frozen graph and only the <=threshold remainder to the VLM at val/test.
  use: true
  threshold: 0.8             # graph decision confidence max(p, 1-p); conf<=threshold goes to the VLM
  # Train only the pairs delegated to the VLM (current protocol), or retain the
  # full train population as auxiliary supervision. Validation/test routing is
  # unchanged in either case.
  train_population: low_confidence   # low_confidence | full
  # Full-population only. 1.0 disables it; e.g. 4.0 samples conf<=threshold
  # pairs four times as often via weighted sampling while samples_per_epoch stays fixed.
  low_confidence_weight: 1.0

model:
  qwen: Qwen/Qwen3-VL-8B-Instruct
  max_pixels: 200704          # <= 448 x 448 pixels; aspect ratio is preserved
  # Output is fixed to generative yes/no. ``text`` writes the cached graph probabilities,
  # including previous/current/next context; ``text_tokens`` additionally replaces inline
  # placeholders with learned projections of frozen cache features.
  include_graph_evidence: true
  graph_evidence_mode: text            # text | text_tokens
  graph_tokens:                 # read only when graph_evidence_mode=text_tokens
    features: [gaze_heatmap, edge_pp]
    edge_dim: 256
    dropout: 0.10
  gradient_checkpointing: true
  lora:
    rank: 8
    alpha: 16
    dropout: 0.05
    targets: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

input:
  # The image is the plain frame; identities and graph evidence are supplied as text.
  reuse_frozen_vision: true
  group_by_frame: true        # only effective when reuse_frozen_vision=true
  vision_cache_size: 1       # bounded in-memory GPU LRU, in frames
  # Draw the queried pair's head boxes on the frame (A=red, B=blue) so the VLM sees
  # which people "Person A/B" refer to instead of resolving text coordinates. Each pair
  # then has a distinct image, so per-frame vision reuse no longer saves compute
  # (the vision cache key is made pair-unique to stay correct).
  draw_pair_bboxes: true

sampling:
  # once: visit every row in the selected train manifest exactly once per epoch.
  # The other choices resample with replacement; use them only as explicit
  # distribution ablations, never to choose a dataset subset.
  strategy: once              # once | uniform | task_balanced | task_label_balanced
  samples_per_epoch: 0        # resampling only; 0 = selected manifest length

train:
  epochs: 3
  bs: 16
  accum: 4
  num_workers: 8
  raw_image_cache_size: 1    # decoded PIL-frame LRU; separate from vision cache
  seed: 101
  wandb_log_interval: 25

optim:
  lr: 1.0e-4                  # LoRA parameters (the only trainable parameters here)
  weight_decay: 0.01
  grad_clip: 1.0
  scheduler: cosine
  warmup_ratio: 0.03

val:
  bs: 64
  num_workers: 8
  raw_image_cache_size: 1
  prompt_seed: 101            # fixed wording for comparable validation/test AP
  threshold: 0.5              # F1 threshold; AP/AUC are threshold-free
