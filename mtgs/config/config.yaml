device: cuda

wandb:
  project_name: MTGS+graph
  username: gaze-social
  log: True
  watch_freq: 500
  watch: null
  group: gaze-social # update group name

model:
  encoder_name: dinov2_vitb14
  patch_size: 14
  head_size: 224
  output: heatmap
  token_dim: 768
  image_size: ${data.image_size}
  gaze_feature_dim: 512
  encoder_depth: 12
  encoder_num_heads: 12
  encoder_num_global_tokens: 1
  encoder_mlp_ratio: 4.0
  encoder_use_qkv_bias: True
  encoder_drop_rate: 0.0
  encoder_attn_drop_rate: 0.0
  encoder_drop_path_rate: 0.0
  decoder_feature_dim: 128
  decoder_hooks: [2, 5, 8, 11]
  decoder_hidden_dims: [96, 192, 384, 768]
  decoder_use_bn: True
  gaze_weights: /home/jinwoongjung/MTGS/weights/gaze360_resnet18.pt # update path
  multivit_weights: False
  weights: "/home/jinwoongjung/MTGS/experiments/GazeFollow/train/checkpoints/best.ckpt"  # {False, path to weights}

# ── Gaze Graph (social-prediction head; attached after the fixed interaction trunk) ──
gaze_graph:
  # Core graph architecture
  use: true             # true: GazeGraphBlock head | false: social decoder(person token pair→LAH/LAEO/SA)
  num_layers: 2
  edge_dim: 512         # edge/refiner width (raised 256→512 to match trunk relational scale)

  # Option A — social→trunk gradient firewall. true: detach person_tokens before
  # the graph so the social loss trains ONLY gaze_graph_block, not the trunk's
  # people_interaction/temporal (they stay trained by gaze/heatmap/inout). Forces
  # relational reasoning into the graph → row/col ablation becomes meaningful.
  detach_input: true

  # Graph readout / edge features
  laeo_derive: "decoder"  # "decoder": head_laeo MLP | "lah_min": min(LAH_i→j, LAH_j→i)
  use_prior: false       # scale geometric edge features by learnable prior_w
  prior_weight: 0.5     # initial value of prior_w

  # Ablation: node-init feature terms (capacity-controlled, same pattern as use_prior)
  # face_proj / node_geom_mlp are ALWAYS built, so param count is unchanged; a disabled
  # term's contribution is zeroed in forward (node = LN(person_token + face) + geom_emb).
  use_face_proj: true   # detached raw-face re-injection (GazeEncoder token) into node init
  use_node_geom: false   # [cx,cy,w,h,gaze_vec] geometry MLP into node init

  # Training
  frozen: false
  lambda_null: 0.5      # weight for dual null-edge loss (null_in + null_out)
  # LR multiplier for the gaze_graph_block param group ONLY (trunk stays at
  # optimizer.lr). The graph is random-init and, under detach_input, the only
  # module the social loss trains, so it needs a much higher LR than the
  # warm-started trunk. peak graph LR = optimizer.lr * head_lr_mult.
  head_lr_mult: 100

  # Ablation: row/column edge message passing (capacity-controlled)
  # Row/col edge-attention ablation (capacity-controlled: encoders always built, a
  # disabled branch only has its context zeroed, so all 4 settings share param count).
  # both=true/true (default), row-only=true/false, col-only=false/true, neither=false/false.
  # Ablates row/col ATTENTION only; node-update / re-inject / temporal steps still run.
  use_row_attn: false    # source i attends over its Tl outgoing-edge targets
  use_col_attn: false    # target k attends over its N incoming-edge sources

  # Ablation: per-edge temporal message passing (step ⑥ only)
  # Graph's OWN per-edge temporal attention (refiner step ⑥ — NOT the MTGS
  # people-temporal / gaze-temporal modules). Module-skip ablation: off => the
  # temporal encoder is not built and step ⑥ is skipped (params removed, unlike
  # row/col which are capacity-controlled). Only active when T>1 anyway.
  use_temporal_attn: true

  # Ablation: explicit null routing nodes (capacity-controlled)
  # Null-node ablation (capacity-controlled: slot/params/heads always built; a disabled
  # null node is masked in ev_bool so every E[i→null] stays 0 and is excluded as an
  # attention key — cutting its info flow while head_sa keeps ni=0, dim unchanged).
  # Its BCE aux loss is auto-dropped when off. null_in = in-frame scene-object node
  # (SA's direct consumer); null_out = out-of-frame routing node.
  #   Full: true/true | -Null_in: false/true | -Null_out: true/false | -Both: false/false
  use_null_in: true
  use_null_out: true

head_detector:
  checkpoint_file: /home/jinwoongjung/MTGS/weights/crowdhuman_yolov5m.pt # update path
  detection_thr: 0.4
  image_size: 640
  conf_thr: 0.25
  iou_thr: 0.45
  expand_bbox: 0.1

tracker:
  det_threshold: 0.2
  asso_threshold: 0.1
  max_age: 300
  inertia: 0.5

data:
  num_people: 4
  image_size: 448
  temporal_stride: 3
  temporal_context: 2
  heatmap_size: 64
  return_head_mask: False
  ann_root: /home/jinwoongjung/MTGS/data/annotations/VSGaze # update path
  num_samples: 36000    # GazeFollow: 108955, VSGaze: 36000
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null
  gazefollow:
    root: /home/jinwoongjung/MTGS/data/gazefollow_extended # update path
  videocoatt:
    root: /home/jinwoongjung/MTGS/data/VideoCoAtt_Dataset # update path
  vat:
    root: /home/jinwoongjung/MTGS/data/VideoAttentionTarget # update path
  uco_laeo:
    root: /home/jinwoongjung/MTGS/data/UCO-LAEO # update path
  childplay:
    root: /home/jinwoongjung/MTGS/data/ChildPlay # update path

demo:
  checkpoint_file: /${hydra:runtime.cwd}/../data/demo/mtgs_model.ckpt
  video_file: /${hydra:runtime.cwd}/../data/demo/video.mp4
  output_folder: /${hydra:runtime.cwd}/output_demo/
  heatmap_pid: -1
  inout_thr: 0.80
  alpha: 0.5

visualization:
  show_gaze_vec: True
  show_frame_nb: True
  thickness: 2
  font_scale: 2.0
  colors: [[200, 0, 0], [0, 200, 0], [0, 0, 200], [200, 200, 0], [200, 0, 200], [0, 200, 200], [255, 99, 71], [47, 79, 79], [75, 0, 130], [255, 140, 0], [160, 82, 45], [255, 105, 180], [128, 128, 0]]
  gaze_point_size: 24
  head_center_size: 24

image:
  normalization:
    mean: [0.44232, 0.40506, 0.36457]
    std: [0.28674, 0.27776, 0.27995]

experiment:
  name: GazeFollow_Training
  task: train+test
  dataset: vsgaze # /!\ gazefollow, childplay, vat, videocoatt, uco_laeo, vsgaze
  output_folder: ${hydra:run.dir} # to retrieve logs and checkpoints

train:
  seed: 101
  matmul_precision: medium # highest, high, medium
  precision: bf16-mixed  # 64 (double), 32 (full), 16 (16bit mixed), bf16-mixed (bfloat16 mixed). Defaults to 32.
  epochs: 20
  batch_size: 8
  accumulate_grad_batches: 1
  resume: False
  resume_from: null
  freeze:
    gaze_encoder: False
    gaze_encoder_backbone: False
    image_tokenizer: True
    depth_tokenizer: False
    vit_encoder: True
    vit_adaptor: False
    gaze_decoder: False
    inout_decoder: False
    # Post-training (gaze_graph only): use the loaded transformer trunk as a
    # FROZEN visual extractor and train ONLY gaze_graph_block. Freezes the whole
    # model, then re-enables grad on gaze_graph_block. Overrides the flags above.
    all_but_gaze_graph: False
  checkpoint_monitor: "metric/val/dist"
  checkpoint_mode: "min"

val:
  batch_size: 8

test:
  checkpoint: null
  batch_size: 1

optimizer:
  lr: 1e-6
  weight_decay: 1e-3

scheduler:
    type: CosineAnnealingLR     # "CosineAnnealingLR": warmup→cosine decay | "constant": fixed LR, no scheduler
    warmup_epochs: 3   # linear warmup length in EPOCHS (only used by CosineAnnealingLR)
    eta_min: 0         # final LR floor for the cosine decay (only used by CosineAnnealingLR)

hydra:
  run:
    dir: /${hydra:runtime.cwd}/../experiments/${now:%Y-%m-%d}/${now:%H-%M-%S}

  job_logging:
    version: 1

    root:
      level: INFO
      handlers: [console, file]

    handlers:
      console:
        class: colorlog.StreamHandler
        formatter: color
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: file
        filename: ${hydra:run.dir}/mylog.log

    formatters:
      color:
        format: "%(log_color)s%(asctime)s | %(name)s | %(levelname)-8s | %(message)s"
        datefmt: "%H:%M:%S"
        class: colorlog.ColoredFormatter
        log_colors:
          DEBUG:    cyan
          INFO:     green
          WARNING:  yellow
          ERROR:    red
          CRITICAL: bold_red
      file:
        format: "%(asctime)s | %(name)s | %(levelname)-8s | %(message)s"
        datefmt: "%H:%M:%S"
