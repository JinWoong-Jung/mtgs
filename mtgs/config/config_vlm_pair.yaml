# Pair-wise MTGS graph-feature + Qwen3-VL residual fine-tuning (vlm.train_pair).
experiment:
  name: EyeVLM_GraphToken_JSON_v1
  out_root: experiments/vlm_pair
  mode: vlm                 # vlm | graph_mlp | features_mlp
  monitor: social_ap
  monitor_mode: max

model:
  qwen: Qwen/Qwen3-VL-8B-Instruct
  graph_dim: 256
  graph_hidden_dim: 1024
  heatmap_conv_dim: 128
  # Visual-token budget cap (EyeVLM: 200704 = 448x448, aspect ratio preserved).
  max_pixels: 200704
  # generative: EyeVLM-style JSON SFT. The LM generates [{"label": 1}] or
  # [{"label": 0}]; graph vectors are injected at <gtok0>...<gtok3>.
  # yesno is the legacy hidden-state / LM-head readout path.
  output: generative
  # gtoken: legacy graph feature soft-tokens at <gtok*>.
  # text  : graph predictions written as natural-language probabilities in the prompt;
  #         answer is a single word yes/no scored by logP(yes)-logP(no). No <gtok> injection.
  graph_evidence: text
  # Used only by graph_mlp/features_mlp controls and the legacy yesno path.
  decoder_hidden_dim: 512
  decoder_dropout: 0.1
  # Legacy yesno-only option; ignored by output: generative.
  graph_residual: false
  # Reduces activation memory for the first 8B generative run.
  gradient_checkpointing: true
  lora:
    rank: 16
    alpha: 32
    dropout: 0.05
    targets: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

input:
  # Plain (unmarked) images are required for cross-pair vision-encoding reuse: a red/blue
  # A/B overlay changes the pixels for every pair. Person identity remains explicit through
  # the normalized text bbox coordinates in each prompt.
  draw_bboxes: false
  # Reuse stays disabled until the text-generative path wires it end-to-end (Tasks 5-7).
  reuse_frozen_vision: false
  group_by_frame: false
  vision_cache_size: 0

loss:
  # Unused by JSON-generative CE; retained for control and legacy runs.
  pos_weight: auto
  pos_weight_min: 0.2
  pos_weight_max: 5.0
  # DEPRECATED: the LM auxiliary is subsumed — yes/no is now the PRIMARY head, not an aux.
  lm_aux_weight: 0.0

routing:
  # Confidence-gated routing is OFF for training and evaluation: the VLM scores every pair,
  # so reported metrics come from one calibrated source. Mixing graph logits and VLM margins
  # is reserved for a future serving-time cost optimization evaluated separately.
  use: false
  threshold: 0.8      # retained for optional future serving-time routing

sampler:
  # EyeVLM-style balanced re-sampling: task_label makes pos/neg EVEN across the 3 tasks.
  # Safe with output=generative (next-token CE, no pos_weight). For the BCE yesno paths
  # use task + loss.pos_weight instead (task_label + pos_weight double-corrects labels).
  balance_mode: task_label  # none | task | task_label
  # Keep task/label balancing unconfounded by graph-error hard mining.
  hard_weight: false
  hard_floor: 0.25

train:
  epochs: 3
  # Effective batch = 16. Increase only after the first forward/backward confirms memory headroom.
  bs: 16
  accum: 1
  # Routing no longer shrinks the training population, so restore the full epoch budget.
  samples_per_epoch: 60000
  num_workers: 6
  raw_image_cache_size: 16
  seed: 101
  # Emit train loss/accuracy/LR every N optimizer updates; epoch summaries and
  # validation metrics remain logged after validation finishes.
  wandb_log_interval: 25

optim:
  lr: 1.0e-4
  new_module_lr: 1.0e-3
  weight_decay: 0.01
  grad_clip: 1.0
  scheduler: cosine
  warmup_ratio: 0.03

val:
  # Shared by validation and the independent test evaluator.
  bs: 32
  num_workers: 6
  raw_image_cache_size: 16
  # Fix evaluation prompt sampling so AP is comparable across epochs and test runs.
  prompt_seed: 101
  threshold: 0.5

control:
  hidden_dim: 32
  feature_hidden_dim: 512
  dropout: 0.0
  include_heatmaps: false   # features_mlp ablation; false = person+relation only
  heatmap_pool_size: 8
  bs: 4096
  val_bs: 8192
  feature_bs: 512           # graph tensors include per-person heatmaps at collate time
  feature_val_bs: 1024
  accum: 1
  lr: 1.0e-3
