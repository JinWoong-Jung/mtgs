# ─────────────────────────────────────────────────────────────────────────────
# VLM Stage-2 FRAME pipeline hyperparameters (vlm.train_frame).
#   ONE VLM forward per frame; PairwiseSocialHead outputs a standalone vlm_logit per
#   pair and fuses it with the frozen graph logit by a learnable per-task convex blend
#   α: final = α·graph + (1-α)·vlm. vlm_logit is separately supervised (aux BCE).
#   Reuses the SAME graph_extract.sh artifacts as the token pipeline — no re-extract.
#   scripts/train_vlm_frame.sh reads this file.
# ─────────────────────────────────────────────────────────────────────────────

experiment:
  name: VLM_Frame_v5_blend50
  out_root: experiments/vlm_frame
  monitor: social_ap         # social_ap(=LAH/LAEO/SA AP 평균) | social_auc | F1_* | AP_SA | mean_social

fusion:                      # graph↔VLM 융합 (학습 라우터 없음, 고정 가중치)
  graph_weight: 0.5          # final = graph_weight·graph + (1-graph_weight)·vlm  (0.5 = 50/50)

sampler:                     # hard-example weighted FRAME sampling
  hard_weight: true          # frame weight = mean_rec[ (task,ans)-balance × (floor + |gt − p_graph|) ]
  hard_floor: 0.25

train:
  epochs: 3
  bs: 2                      # frames/step. Variable person count → keep modest; use accum for eff. batch
  accum: 4                   # effective batch = bs * accum = 8 frames
  frames_per_epoch: 12000    # WeightedRandomSampler draws/epoch (train ~20k frames → 36k/3ep ≈ 1.8× cover)
  num_workers: 6
  rank: 16                   # LoRA rank (lora_alpha = 2*rank)
  seed: 101
  lora_targets:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

optim:
  lr: 1.0e-4                 # LoRA adapters
  new_module_lr: 1.0e-3      # projector / heatmap-encoder / social-head (α + vlm MLP)
  aux_weight: 0.5            # weight on standalone vlm_logit BCE (keeps vlm alive/calibrated)
  weight_decay: 0.01
  grad_clip: 1.0
  scheduler: cosine          # none | constant | linear | cosine
  warmup_ratio: 0.03

val:
  vlm_bs: 8                  # frame-eval forward batch
  limit: 0                   # 0 = ALL val frames (frame pipeline is cheap: ~9.9k frames)

eval:
  vlm_bs: 8                  # test frame-eval batch
  num_workers: 10
